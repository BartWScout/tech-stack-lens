<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TechStackLens Report — {{DATE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  @page { size: 210mm 297mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: #faf7f1;
    color: #2c2c2c;
    padding: 52px 56px 128px;
    font-size: 13px;
    line-height: 1.6;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: #1a1a1a;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: #c47b2b;
    margin-top: 32px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1.5px solid #e8dcc8;
  }
  h3 {
    font-family: 'Source Serif 4', serif;
    font-size: 15px;
    font-weight: 600;
    color: #5a4a32;
    margin-top: 18px;
    margin-bottom: 8px;
  }
  .cover-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #8a7a62;
    margin-bottom: 4px;
  }
  .cover-subtitle {
    font-size: 16px;
    color: #5a4a32;
    margin-bottom: 28px;
    font-style: italic;
  }
  .cover-divider {
    width: 60px;
    height: 3px;
    background: #c47b2b;
    margin: 20px 0 28px;
  }
  .card {
    background: #fff;
    border: 1px solid #e8dcc8;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 14px;
    page-break-inside: avoid;
  }
  .card-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .card-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #fff;
    background: #c47b2b;
    padding: 2px 8px;
    border-radius: 3px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .card-body { font-size: 13px; color: #3a3a3a; }
  .card-body p { margin-bottom: 6px; }
  .example {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: #f5f0e6;
    padding: 8px 12px;
    border-radius: 4px;
    margin: 6px 0;
    color: #5a4a32;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 12px;
    page-break-inside: avoid;
  }
  th {
    background: #c47b2b;
    color: #fff;
    padding: 8px 10px;
    text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
  }
  td {
    padding: 7px 10px;
    border-bottom: 1px solid #e8dcc8;
  }
  tr:nth-child(even) td { background: #faf7f1; }
  .health-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin: 12px 0;
  }
  .health-item {
    background: #fff;
    border: 1px solid #e8dcc8;
    border-radius: 6px;
    padding: 10px 14px;
    page-break-inside: avoid;
  }
  .health-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #8a7a62;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .health-value {
    font-size: 22px;
    font-weight: 700;
    margin-top: 2px;
  }
  .green { color: #2d8a4e; }
  .amber { color: #c47b2b; }
  .red { color: #c0392b; }
  .tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    margin: 2px 2px 2px 0;
  }
  .tag-install { background: #d4edda; color: #155724; }
  .tag-configure { background: #fff3cd; color: #856404; }
  .tag-fix { background: #f8d7da; color: #721c24; }
  .tag-skip { background: #e8dcc8; color: #5a4a32; }
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #c47b2b;
    color: #fff;
    padding: 10px 56px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    display: flex;
    justify-content: space-between;
  }
  /* CONTENT PLACEHOLDER — populated at runtime */
</style>
</head>
<body>

<!-- COVER -->
<div class="cover-date">{{DATE}}</div>
<h1>TechStackLens</h1>
<div class="cover-subtitle">{{PROFILE_SUMMARY}}</div>
<div class="cover-divider"></div>
<p style="font-size: 15px; margin-bottom: 32px;">{{HEADLINE}}</p>

<!-- CONTENT SECTIONS — injected at runtime -->
{{CONTENT}}

<div class="footer">
  <span>TechStackLens &middot; {{DATE}}</span>
  <span>github.com/BartWScout/tech-stack-lens</span>
</div>

</body>
</html>
